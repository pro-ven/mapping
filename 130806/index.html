<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Venue Map</title>
<style>
  html, body { height: 100%; margin: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  #map { height: 100%; width: 100%; }
  #status {
    position: absolute; top: 12px; left: 12px; z-index: 5;
    background: rgba(255,255,255,0.95); padding: 6px 12px; border-radius: 6px;
    font-size: 13px; color: #333; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .info-content { font-size: 13px; line-height: 1.4; max-width: 240px; }
  .info-content strong { font-size: 14px; }
</style>
</head>
<body>
<div id="status">Loading venues…</div>
<div id="map"></div>
<script>
  async function initMap() {
    const map = new google.maps.Map(document.getElementById("map"), {
      zoom: 6,
      center: { lat: 54.5, lng: -3.0 } // default center, UK - overridden once data loads
    });
    const statusEl = document.getElementById("status");
    const infoWindow = new google.maps.InfoWindow();
    let venues = [];
    try {
      // cache-bust so browsers don't serve a stale copy of venues.json
      const res = await fetch("venues.json?t=" + Date.now());
      if (!res.ok) throw new Error("HTTP " + res.status);
      venues = await res.json();
    } catch (err) {
      statusEl.textContent = "Couldn't load venue data: " + err.message;
      return;
    }
    if (!Array.isArray(venues) || venues.length === 0) {
      statusEl.textContent = "No venues to display yet.";
      return;
    }
    const bounds = new google.maps.LatLngBounds();
    venues.forEach((v) => {
      const lat = parseFloat(v.latitude);
      const lng = parseFloat(v.longitude);
      if (isNaN(lat) || isNaN(lng)) return;
      const position = { lat, lng };
      const marker = new google.maps.Marker({
        position,
        map,
        title: v.name || ""
      });
      marker.addListener("click", () => {
        infoWindow.setContent(buildInfoContent(v));
        infoWindow.open(map, marker);
      });
      bounds.extend(position);
    });
    map.fitBounds(bounds);
    statusEl.textContent = venues.length + " venue" + (venues.length === 1 ? "" : "s");
    setTimeout(() => { statusEl.style.display = "none"; }, 2500);
  }
  function buildInfoContent(v) {
    const esc = (s) => {
      const div = document.createElement("div");
      div.textContent = s == null ? "" : String(s);
      return div.innerHTML;
    };
    let html = '<div class="info-content"><strong>' + esc(v.name) + "</strong><br>";
    if (v.address) html += esc(v.address) + "<br>";
    if (v.town) html += esc(v.town) + "<br>";
    if (v.currency) html += esc(v.currency) + "<br>";
    if (v["total cost"]) {
      const amt = parseFloat(v["total cost"]);
      html += (isNaN(amt) ? esc(v["total cost"]) : amt.toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 })) + "<br>";
    }
    if (v.cost) html += "Cost: " + esc(v.cost) + "<br>";
    if (v.status) html += "Status: " + esc(v.status) + "<br>";
    if (v["criteria match"]) {
      const match = parseFloat(v["criteria match"]);
      html += "Match: " + (isNaN(match) ? esc(v["criteria match"]) : Math.round(match * 100) + "%") + "<br>";
    }
    if (v.phone) html += "Tel: " + esc(v.phone) + "<br>";
    if (v.website) {
      let url = v.website;
      if (!/^https?:\/\//i.test(url)) url = "https://" + url;
      html += '<a href="' + esc(url) + '" target="_blank" rel="noopener">Website</a><br>';
    }
    if (v.description) html += "<p>" + esc(v.description) + "</p>";
    if (v["criteria detail"]) html += "<p>" + esc(v["criteria detail"]) + "</p>";
    html += "</div>";
    return html;
  }
  window.initMap = initMap;
</script>
<!--
  Replace YOUR_API_KEY_HERE with a Google Maps JavaScript API key.
  This key will be visible in the page source - that's expected for the
  Maps JavaScript API, but you MUST restrict it in Google Cloud Console
  under "API restrictions" + "HTTP referrers" to your github.io domain
  (e.g. https://yourusername.github.io/*), otherwise anyone could use it
  and run up your bill.
-->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDWR1G_g2Ms5Mvi5QMK58jhwT8sWMWJGC4&callback=initMap" async defer></script>
</body>
</html>
